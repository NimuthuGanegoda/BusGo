name: busgo_client
description: BUSGO Client — Passenger mobile application
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Supabase (Realtime bus location only)
  supabase_flutter: ^2.5.3

  # QR code display
  qr_flutter: ^4.1.0

  # Push notifications
  firebase_core: ^3.1.1
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.1

  # Local storage (preferences)
  shared_preferences: ^2.3.1

  # GPS
  geolocator: ^12.0.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
