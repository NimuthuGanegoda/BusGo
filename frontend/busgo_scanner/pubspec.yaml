name: busgo_scanner
description: BUSGO Scanner — QR boarding scanner for bus conductors
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.3

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # QR scanner (camera-based)
  mobile_scanner: ^5.2.1

  # UI
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
