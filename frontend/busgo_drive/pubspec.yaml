name: busgo_drive
description: BUSGO Drive — Driver mobile application
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.2
  

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  http: ^1.2.2

  # HTTP
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Supabase Realtime
  supabase_flutter: ^2.5.3

  # Background GPS tracking (driver needs continuous location)
  geolocator: ^12.0.0

  # Push notifications
  firebase_core: ^3.1.1
  firebase_messaging: ^15.1.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0

  flutter_dotenv: ^5.1.0
  image_picker: ^1.0.7
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/images/scene/
