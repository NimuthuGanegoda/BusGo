version: "3.9"

# ============================================================
#  BusGo — Docker Compose
#  Runs the Node.js API and Python ML service together.
#
#  Usage:
#    1. Copy backend/.env.example → backend/.env and fill values
#    2. Copy ml_service pkl files → ml_service/models/
#    3. docker compose up --build
# ============================================================

services:

  # ── Python ML Microservice ──────────────────────────────────
  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: busgo_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ml_service/models:/app/models:ro   # mount pkl files read-only
    environment:
      ML_PORT: 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s     # sentence-bert takes ~30s to load

  # ── Node.js REST API ────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: busgo_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      ML_SERVICE_URL: http://ml_service:8000
    depends_on:
      ml_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
